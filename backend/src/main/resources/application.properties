spring.application.name=servicedesk-vision
server.port=8088

spring.datasource.url=jdbc:mysql://localhost:3306/servicedesk_vision?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=admin

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

app.jwt.secret=servicedesk-vision-local-development-secret-change-before-production
app.jwt.expiration-minutes=1440

app.mail.enabled=false
app.mail.from=no-reply@servicedesk.local
